<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital AAC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar collapsed" id="app-sidebar">
            <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Toggle sidebar">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="sidebar-nav">
                <button id="sidebar-aac-btn" class="sidebar-btn active" type="button" data-view="aac">AAC</button>
                <button id="sidebar-community-btn" class="sidebar-btn" type="button" data-view="community">Community</button>
            </nav>
        </aside>

        <main class="content">
            <div class="view view-aac active" id="aac-view">
                <div class="container">
                    <div class="top-section">
                        <div id="selected-cards-container">
                            <div class="selected-cards-wrapper">
                                <h3>Selected Cards</h3>
                                <div class="controls">
                                    <button id="reset-btn" type="button">Reset</button>
                                    <button id="suggestion-btn" type="button">
                                        Card Suggestion
                                        <span class="spinner" id="suggestion-spinner" style="display: none;"></span>
                                    </button>
                                </div>
                            </div>
                            <div id="selected-cards"></div>
                        </div>

                        <div id="suggested-cards-container">
                            <h3>Suggested Cards</h3>
                            <div id="suggested-cards"></div>
                        </div>
                    </div>

                    <div class="main-content">
                        <div class="tabs">
                            <button class="tab-btn active" data-category="all">All</button>
                            <button class="tab-btn" data-category="favorite">Favorites</button>
                        </div>
                        <div id="card-container"></div>
                    </div>
                </div>
            </div>

            <div class="view view-community" id="community-view">
                <div class="community-page">
                    <div class="community-page-header">
                        <div>
                            <p class="community-kicker">Community Hub</p>
                            <h2>Community Cards</h2>
                            <p class="community-subtitle">Browse, search, and add cards shared by others.</p>
                        </div>
                        <div class="community-actions">
                            <button id="open-share-btn" type="button">Share</button>
                        </div>
                    </div>

                    <div class="community-search">
                        <input id="community-search-input" type="text" placeholder="Enter a search term" />
                        <button id="community-search-btn" type="button">Search</button>
                    </div>
                    <div id="community-results" class="community-results"></div>
                </div>
            </div>
        </main>
    </div>

    <button id="add-card-btn" class="floating-btn add-card-btn" title="Card Augmentation"></button>
    <button id="record-btn" class="floating-btn record-btn" title="Start Recording"></button>

    <div id="augmented-popup" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <span class="close-btn">&times;</span>
            <h3>Newly Added Cards</h3>
            <div id="augmented-cards-popup-container"></div>
        </div>
    </div>

    <div id="suggestion-popup" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <span class="close-btn" id="suggestion-close-btn">&times;</span>
            <div class="popup-header">
                <h3>Card Augmentation</h3>
                <button id="refresh-suggestions-btn" type="button">Refresh Suggestions</button>
            </div>
            <div id="suggested-new-cards-container"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <div id="community-detail-popup" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <span class="close-btn" id="community-detail-close-btn">&times;</span>
            <h3 id="community-detail-title"></h3>
            <div id="community-detail-body"></div>
            <div class="community-detail-actions">
                <button id="community-detail-audio-btn" type="button">Play Audio</button>
                <button id="community-detail-copy-btn" type="button">Add to Library</button>
            </div>
        </div>
    </div>

    <div id="community-share-popup" class="popup-overlay" style="display: none;">
        <div class="popup-content">
            <span class="close-btn" id="community-share-close-btn">&times;</span>
            <h3>Share a Card to the Community</h3>
            <div class="share-form">
                <label for="share-card-search">Select Card</label>
                <input id="share-card-search" type="text" placeholder="Search your library (e.g., pizza)" autocomplete="off" />
                <div id="share-card-results" class="share-card-results"></div>
                <div id="share-card-selected" class="share-card-selected" style="display: none;"></div>

                <label>Time</label>
                <input id="share-time" type="text" placeholder="e.g., evening" />
                <label>Place</label>
                <input id="share-place" type="text" placeholder="e.g., home" />
                <label>Occasion</label>
                <input id="share-occasion" type="text" placeholder="e.g., dinner" />
                <label>Tags (comma separated)</label>
                <input id="share-tags" type="text" placeholder="e.g., food,korean,rice" />
                <button id="share-submit-btn" type="button">Share to Community</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
